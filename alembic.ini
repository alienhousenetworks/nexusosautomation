# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, space-separated, to be prepended to sys.path:
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to use for "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow the creation of "empty" rev files
# write_empty = false

# version location specification; this defaults
# to alembic/versions.  When using multiple version
# directories, paths must be separated by space or newline.
# version_locations = %(here)s/bar %(here)s/bat alembic/versions

# version path separator; as of Alembic 1.11, this defaults to 'os.pathsep'
# version_path_separator = :

# set to 'true' to search for projects recursively
# recursive_version_loading = false

# logging configuration (will be defined below)
sqlalchemy.url = postgresql://postgres:password@localhost/nexusos

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for details.

# logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
